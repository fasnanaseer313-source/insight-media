<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#D4AF37">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <style>
      .logo-text {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .pathway-line {
        stroke: #D4AF37;
        stroke-width: 2;
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: drawLine 2s ease-out forwards;
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      .fade-in {
        opacity: 0;
        animation: fadeIn 1.5s ease-out forwards;
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Logo Text -->
  <text x="10" y="45" fill="url(#glowGradient)" class="logo-text fade-in" style="font-size: 22px;">
    INSIGHT <tspan fill="#334155" style="font-weight: 400;">PATHWAYS</tspan>
  </text>
  
  <text x="10" y="70" fill="#64748B" class="logo-text fade-in" style="font-size: 10px; letter-spacing: 0.3em; animation-delay: 0.5s;">
    CONSULTING
  </text>

  <!-- Animated Pathway Line -->
  <path d="M10 55 H280" class="pathway-line" fill="none" style="animation-delay: 1s;" />
</svg>
